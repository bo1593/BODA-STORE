<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA ADMIN | إدارة المتجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="p-4 md:p-10">
    <h1 class="text-3xl font-bold text-yellow-500 mb-10 border-b border-slate-800 pb-4">لوحة تحكم BODA STORE 👑</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-2 text-green-400">الطلبات الواردة 📥</h2>
            <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div class="space-y-8">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                <h2 class="font-bold mb-4 text-yellow-500 italic">إضافة باقة جديدة ➕</h2>
                <input type="text" id="pName" placeholder="اسم الباقة (60 UC)" class="w-full p-3 mb-3 bg-slate-800 rounded-xl outline-none focus:ring-2 ring-yellow-500">
                <input type="text" id="pPrice" placeholder="السعر (30 EGP)" class="w-full p-3 mb-4 bg-slate-800 rounded-xl outline-none focus:ring-2 ring-yellow-500">
                <button id="addBtn" onclick="addPkg()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition">نشر الباقة للمتجر</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-xl">
                <h2 class="font-bold mb-4 text-blue-400">تعديل نصوص الموقع 📝</h2>
                <input type="text" id="uiTitle" placeholder="عنوان الترحيب الرئيسي" class="w-full p-3 mb-4 bg-slate-800 rounded-xl outline-none focus:ring-2 ring-blue-500">
                <button onclick="saveUI()" class="w-full bg-blue-600 font-bold py-3 rounded-xl hover:bg-blue-500 transition">حفظ العنوان</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h2 class="font-bold mb-4 text-red-400">المنتجات الحالية (حذف) 🗑️</h2>
                <div id="miniProdList" class="space-y-2 max-h-60 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- وظيفة جلب وعرض الطلبات الواردة ---
        onSnapshot(query(collection(db, "orders"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <div class="flex justify-between text-[10px] text-slate-500 mb-2 font-bold uppercase">
                            <span>${o.date}</span>
                            <span class="text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded">${o.package}</span>
                        </div>
                        <p class="font-bold text-lg mb-1">ID: <span class="text-yellow-400 font-mono tracking-widest">${o.playerID}</span></p>
                        <p class="text-sm mb-4 text-green-500 font-bold">${o.price}</p>
                        <a href="${o.image}" target="_blank" class="block text-center bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-xs mb-3 transition">رؤية التحويل 🖼️</a>
                        <button onclick="confirmDeleteOrder('${d.id}')" class="w-full text-[10px] text-red-500 hover:text-red-400 uppercase font-bold tracking-widest transition">مسح الطلب 🗑️</button>
                    </div>`;
            });
        });

        // --- وظيفة جلب الباقات المتاحة للمسح ---
        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('miniProdList');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center text-xs bg-slate-800/50 p-3 rounded-xl border border-slate-700">
                        <span>${p.name} - <span class="text-yellow-500">${p.price}</span></span>
                        <button onclick="confirmDeleteProduct('${d.id}')" class="text-red-500 font-bold hover:scale-110 transition">حذف</button>
                    </div>`;
            });
        });

        // --- إضافة باقة جديدة ---
        window.addPkg = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const btn = document.getElementById('addBtn');

            if(!name || !price) return alert("اكتب البيانات يا بودا! ⛔");

            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            try {
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: price,
                    timestamp: new Date()
                });
                alert("✅ تم حفظ الباقة بنجاح!");
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
            } catch (e) {
                alert("❌ فشل الحفظ: " + e.message);
            }
            btn.disabled = false;
            btn.innerText = "نشر الباقة للمتجر";
        };

        // --- حفظ تعديلات واجهة الموقع ---
        window.saveUI = async () => {
            const title = document.getElementById('uiTitle').value;
            if(!title) return alert("اكتب العنوان أولاً!");
            try {
                await setDoc(doc(db, "settings", "ui"), { title: title });
                alert("✅ تم تحديث عنوان الموقع!");
            } catch (e) {
                alert("❌ فشل التحديث!");
            }
        };

        // --- وظائف الحذف ---
        window.confirmDeleteProduct = async (id) => {
            if(confirm("هل تريد حذف هذه الباقة نهائياً؟")) {
                await deleteDoc(doc(db, "products", id));
            }
        };

        window.confirmDeleteOrder = async (id) => {
            if(confirm("هل تم شحن هذا الطلب وتريد مسحه؟")) {
                await deleteDoc(doc(db, "orders", id));
            }
        };

        // جعل الدوال متاحة للـ HTML
        window.db = db;
        window.doc = doc;
        window.deleteDoc = deleteDoc;
    </script>
</body>
</html>
