<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
        authDomain: "boda-store-fb2b4.firebaseapp.com",
        projectId: "boda-store-fb2b4",
        storageBucket: "boda-store-fb2b4.firebasestorage.app",
        messagingSenderId: "363262838551",
        appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.addPkg = async () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;

        if(!name || !price) return alert("اكتب البيانات يا بودا!");

        try {
            // حفظ في مجموعة اسمها products
            await addDoc(collection(db, "products"), {
                name: name,
                price: price,
                timestamp: new Date()
            });
            alert("✅ تم حفظ الباقة بنجاح! اذهب لصفحة العميل وستجدها.");
            location.reload(); 
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("❌ فشل الحفظ: " + e.message);
        }
    };
</script>
