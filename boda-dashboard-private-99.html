<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BODA ADMIN | إدارة المتجر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }</style>
</head>
<body class="p-4 md:p-10">
    <h1 class="text-3xl font-bold text-yellow-500 mb-10 border-b border-slate-800 pb-4">لوحة تحكم BODA STORE 👑</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-2 text-green-400">الطلبات الواردة 📥</h2>
            <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div class="space-y-8">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h2 class="font-bold mb-4 text-yellow-500">إضافة باقة جديدة ➕</h2>
                <input type="text" id="pName" placeholder="اسم الباقة (60 UC)" class="w-full p-3 mb-3 bg-slate-800 rounded-xl outline-none">
                <input type="text" id="pPrice" placeholder="السعر (30 EGP)" class="w-full p-3 mb-4 bg-slate-800 rounded-xl outline-none">
                <button onclick="addPkg()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">نشر الباقة</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h2 class="font-bold mb-4 text-blue-400">تعديل نصوص الموقع 📝</h2>
                <input type="text" id="uiTitle" placeholder="عنوان الترحيب الرئيسي" class="w-full p-3 mb-4 bg-slate-800 rounded-xl outline-none">
                <button onclick="saveUI()" class="w-full bg-blue-600 font-bold py-3 rounded-xl">حفظ التغييرات</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h2 class="font-bold mb-4 text-red-400">المنتجات الحالية (حذف) 🗑️</h2>
                <div id="miniProdList" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب الطلبات
        onSnapshot(query(collection(db, "orders"), orderBy("date", "desc")), (snap) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                        <div class="flex justify-between text-[10px] text-slate-500 mb-2"><span>${o.date}</span><span class="text-yellow-500">${o.package}</span></div>
                        <p class="font-bold text-lg mb-1">ID: ${o.playerID}</p>
                        <p class="text-xs mb-4 text-green-500">${o.price}</p>
                        <a href="${o.image}" target="_blank" class="block text-center bg-slate-800 py-2 rounded-lg text-xs mb-2 border border-slate-700">رؤية التحويل 🖼️</a>
                        <button onclick="deleteDoc(doc(db, 'orders', '${d.id}'))" class="w-full text-[10px] text-red-500 uppercase font-bold tracking-widest">مسح الطلب</button>
                    </div>`;
            });
        });

        // جلب المنتجات للمسح
        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('miniProdList');
            list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div class="flex justify-between items-center text-xs bg-black/20 p-2 rounded"><span>${d.data().name}</span><button onclick="deleteDoc(doc(db, 'products', '${d.id}'))" class="text-red-500">حذف</button></div>`;
            });
        });

        window.addPkg = () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            if(name && price) addDoc(collection(db, "products"), { name, price });
        };

        window.saveUI = () => {
            const title = document.getElementById('uiTitle').value;
            if(title) setDoc(doc(db, "settings", "ui"), { title });
        };
        
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.db = db;
    </script>
</body>
</html>
