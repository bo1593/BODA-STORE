<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة BODA STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }</style>
</head>
<body class="p-4 md:p-10">
    <h1 class="text-3xl font-bold text-yellow-500 mb-10 border-b border-slate-700 pb-4">طلبات الشحن الواردة 📦</h1>

    <div id="loading" class="text-center text-slate-500">جاري تحميل الطلبات...</div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="ordersContainer">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "orders"), orderBy("time", "desc"));

        onSnapshot(q, (snapshot) => {
            document.getElementById('loading').classList.add('hidden');
            const container = document.getElementById('ordersContainer');
            container.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl shadow-lg">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] text-slate-500">${data.time}</span>
                            <span class="bg-yellow-500 text-black text-[10px] px-2 py-1 rounded font-bold uppercase">${data.package}</span>
                        </div>
                        <p class="text-lg font-bold mb-1">ID: <span class="text-yellow-400 font-mono">${data.id}</span></p>
                        <p class="text-sm text-slate-400 mb-4 font-bold">المطلوب: ${data.price}</p>
                        <a href="${data.screenshot}" target="_blank" class="block w-full text-center bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm transition mb-2">فحص صورة التحويل 🖼️</a>
                        <button class="w-full bg-green-600/20 text-green-500 border border-green-600/50 py-2 rounded-lg text-sm">تم الشحن ✅</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
