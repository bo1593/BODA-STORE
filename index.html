<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA STORE | شحن شدات ببجي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .card-grad { background: linear-gradient(145deg, #1e293b, #334155); border: 1px solid #334155; transition: 0.3s; }
        .btn-gold { background: linear-gradient(90deg, #fbbf24, #d97706); color: #0f172a; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="p-5 bg-slate-900 border-b border-yellow-500/30 flex justify-between items-center sticky top-0 z-40">
        <h1 class="text-2xl font-bold text-yellow-500">BODA <span class="text-white">STORE</span></h1>
        <div class="text-xs bg-green-500/10 text-green-500 px-3 py-1 rounded-full border border-green-500/20">متصل 🟢</div>
    </nav>

    <header class="text-center py-12 px-4">
        <h2 id="heroTitle" class="text-4xl font-extrabold mb-4 italic">جاري تحميل العروض...</h2>
        <p class="text-slate-400">الدفع عبر فودافون كاش: <span class="text-yellow-500 font-bold">01044580421</span></p>
    </header>

    <main id="productsGrid" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        </main>

    <div id="paymentModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-slate-800 p-6 rounded-3xl border-2 border-yellow-500 w-full max-w-md my-auto shadow-2xl">
            <h3 class="text-2xl font-bold text-center text-yellow-500 mb-6 font-mono">CONFIRM ORDER 🛒</h3>
            <div class="bg-slate-900 p-4 rounded-xl mb-6 text-center border border-slate-700">
                <p class="text-xs text-slate-400 mb-1">حول المبلغ لـ فودافون كاش:</p>
                <p class="text-xl font-bold text-green-400">01044580421</p>
            </div>
            <div class="space-y-4 text-right">
                <label class="text-sm">باقة: <span id="displayPkg" class="text-yellow-500 font-bold"></span></label>
                <input type="number" id="playerID" placeholder="أدخل الـ ID (ببجي)" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-yellow-500">
                <label class="block text-sm">ارفق سكرين التحويل:</label>
                <input type="file" id="screenshot" accept="image/*" class="w-full text-xs text-slate-500 file:bg-yellow-500 file:text-black file:rounded-full file:px-4 file:py-2 file:border-0">
            </div>
            <button id="sendBtn" onclick="handleOrder()" class="w-full btn-gold py-4 rounded-2xl mt-8 text-lg shadow-lg">إرسال الطلب ✅</button>
            <button onclick="closeModal()" class="w-full text-slate-500 mt-4 text-sm">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSK2BXXJumwNYmKtXP8Ej_Guu2B0icrbs",
            authDomain: "boda-store-fb2b4.firebaseapp.com",
            projectId: "boda-store-fb2b4",
            storageBucket: "boda-store-fb2b4.firebasestorage.app",
            messagingSenderId: "363262838551",
            appId: "1:363262838551:web:a037c8c8c0d5c01da51952"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentPkg = "", currentPrice = "";

        // 1. جلب نصوص الواجهة
        onSnapshot(doc(db, "settings", "ui"), (d) => {
            if(d.exists()) document.getElementById('heroTitle').innerText = d.data().title;
        });

        // 2. جلب المنتجات
        onSnapshot(collection(db, "products"), (snap) => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                    <div class="card-grad p-8 rounded-3xl text-center shadow-xl">
                        <h3 class="text-2xl font-bold mb-2 text-yellow-500">${p.name}</h3>
                        <p class="text-4xl font-extrabold mb-6">${p.price}</p>
                        <button onclick="openPayment('${p.name}', '${p.price}')" class="btn-gold w-full py-3 rounded-2xl">شراء الآن</button>
                    </div>`;
            });
        });

        window.openPayment = (pkg, prc) => {
            currentPkg = pkg; currentPrice = prc;
            document.getElementById('displayPkg').innerText = pkg + " (" + prc + ")";
            document.getElementById('paymentModal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('paymentModal').classList.add('hidden');

        window.handleOrder = async () => {
            const id = document.getElementById('playerID').value;
            const file = document.getElementById('screenshot').files[0];
            const btn = document.getElementById('sendBtn');
            if(!id || !file) return alert("أكمل البيانات!");

            btn.disabled = true; btn.innerText = "جاري الإرسال...";
            try {
                const sRef = ref(storage, `receipts/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "orders"), {
                    playerID: id, package: currentPkg, price: currentPrice, image: url, status: "قيد المراجعة", date: new Date().toLocaleString('ar-EG')
                });
                alert("تم استلام طلبك! سيتم الشحن خلال دقائق.");
                location.reload();
            } catch (e) { alert("فشل الإرسال!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
